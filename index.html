<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NScard.R.A.Tonolli</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 105, 20, 0.24), transparent 26%),
        radial-gradient(circle at 80% 0%, rgba(0, 245, 255, 0.18), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(0, 255, 220, 0.08), transparent 35%),
        linear-gradient(135deg, #06070b, #101827 55%, #050608);
      color: #f4f4f4;
      line-height: 1.65;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 220, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 220, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,0.18)),
        radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.55));
      pointer-events: none;
      z-index: -1;
    }

    .page { max-width: 1180px; margin: auto; padding: 32px 18px; }

    .hero {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 34px;
      align-items: center;
      padding: 36px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(12, 18, 30, 0.96), rgba(6, 8, 13, 0.94));
      border: 1px solid rgba(0, 255, 220, 0.32);
      box-shadow:
        0 0 36px rgba(0, 255, 220, 0.16),
        inset 0 0 32px rgba(255, 105, 20, 0.06);
      position: relative;
      overflow: hidden;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      background: #06080d;
      border-radius: 23px;
      border: 4px solid #080b10;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      color: #06110f;
      background: #00ffe0;
      box-shadow: 0 0 18px rgba(0, 255, 220, 0.28);
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 28px rgba(0, 255, 220, 0.45);
    }

    .btn.secondary {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 122, 26, 0.70);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 24px;
    }

    .card {
      background:
        linear-gradient(135deg, rgba(16, 22, 34, 0.94), rgba(10, 13, 20, 0.92));
      border-radius: 22px;
      padding: 26px;
    }

    .full { grid-column: 1 / -1; }

    h2 {
      font-size: 22px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(0, 255, 220, 0.28);
    }

    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <main class="page">

    <section class="hero">

      <div class="photo-wrap">
        <img src="photo.jpg" alt="Photo de Romain Tonolli">
      </div>

      <div>
        <h1>Romain Tonolli</h1>
        <div class="job">Technicien industriel polyvalent</div>

        <div class="buttons">
          <a class="btn" href="mailto:romain.tonolli@aol.fr">Me contacter</a>
          <a class="btn secondary" href="tel:+33601840379">Appeler</a>

          <!-- 🔥 NOUVEAU BOUTON PDF -->
          <a class="btn" href="CV_Romain_Tonolli_v2.pdf" download>
            Télécharger mon CV PDF
          </a>

        </div>
      </div>

    </section>

  </main>

</body>
</html>
